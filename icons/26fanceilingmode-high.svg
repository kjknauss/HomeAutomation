<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <linearGradient id="bladeNear" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="100%" stop-color="#C9932F"/>
  </linearGradient>
  <linearGradient id="bladeFar" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#A97828"/>
    <stop offset="100%" stop-color="#6B4A18"/>
  </linearGradient>
  <linearGradient id="bladeSide" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#D9A94A"/>
    <stop offset="100%" stop-color="#8A6420"/>
  </linearGradient>
  <linearGradient id="windArc" gradientUnits="userSpaceOnUse" x1="1" y1="0" x2="31" y2="0">
    <stop offset="0%" stop-color="#BFE6FF"/>
    <stop offset="55%" stop-color="#3E86D6"/>
    <stop offset="100%" stop-color="#164C82"/>
  </linearGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
</defs>

<g filter="url(#dropshadow)">

  <path d="M5.19,15.26 A11.50,8.00 0 0 1 13.02,10.27" fill="none" stroke="url(#windArc)" stroke-width="0.7" stroke-linecap="round"/>
<path d="M26.81,15.26 A11.50,8.00 0 0 0 18.98,10.27" fill="none" stroke="url(#windArc)" stroke-width="0.7" stroke-linecap="round"/>
<path d="M3.60,14.85 A13.20,9.20 0 0 1 12.58,9.11" fill="none" stroke="url(#windArc)" stroke-width="0.85" stroke-linecap="round"/>
<path d="M28.40,14.85 A13.20,9.20 0 0 0 19.42,9.11" fill="none" stroke="url(#windArc)" stroke-width="0.85" stroke-linecap="round"/>
<path d="M1.90,14.41 A15.00,10.50 0 0 1 12.12,7.86" fill="none" stroke="url(#windArc)" stroke-width="1.0" stroke-linecap="round"/>
<path d="M30.10,14.41 A15.00,10.50 0 0 0 19.88,7.86" fill="none" stroke="url(#windArc)" stroke-width="1.0" stroke-linecap="round"/>

  <!-- ceiling flange -->
  <circle cx="16" cy="3.4" r="2.3" fill="url(#brass)" stroke="#4A3410" stroke-width="0.4"/>
  <circle cx="14.6" cy="2.6" r="0.4" fill="url(#rivet)"/>
  <circle cx="17.4" cy="2.6" r="0.4" fill="url(#rivet)"/>

  <!-- down-rod -->
  <rect x="15.3" y="5.4" width="1.4" height="5.4" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.3"/>
  <!-- coupling collar -->
  <ellipse cx="16" cy="11" rx="1.9" ry="0.85" fill="url(#brass)" stroke="#4A3410" stroke-width="0.35"/>

  <!-- blade/hub assembly, squashed for the from-below viewing angle -->
  <g transform="translate(16,18) scale(1,0.7) translate(-16,-18)">
    <!-- dark dome crescent -->
    <path d="M12.6,19.6 A3.6,3.6 0 0 0 19.4,19.6 A4.6,2 0 0 1 12.6,19.6 Z" fill="#2A1D08" opacity="0.55"/>

    <!-- far blade (top, tinted darker) -->
    <path d="M16,18 C15.3,15 14.8,11.5 16,9 C17.2,11.5 16.7,15 16,18 Z" fill="url(#bladeFar)" stroke="#4A3410" stroke-width="0.3"/>
    <!-- side blades -->
    <path d="M16,18 C13,17.3 9.5,16.8 7,18 C9.5,19.2 13,18.7 16,18 Z" fill="url(#bladeSide)" stroke="#4A3410" stroke-width="0.3"/>
    <path d="M16,18 C19,17.3 22.5,16.8 25,18 C22.5,19.2 19,18.7 16,18 Z" fill="url(#bladeSide)" stroke="#4A3410" stroke-width="0.3"/>
    <!-- near blade (bottom, tinted lighter) -->
    <path d="M16,18 C16.7,21 17.2,24.5 16,27 C14.8,24.5 15.3,21 16,18 Z" fill="url(#bladeNear)" stroke="#4A3410" stroke-width="0.3"/>

    <!-- riveted motor hub -->
    <circle cx="16" cy="18" r="2.7" fill="url(#brass)" stroke="#4A3410" stroke-width="0.4"/>
    <circle cx="16" cy="16.2" r="0.4" fill="url(#rivet)"/>
    <circle cx="16" cy="19.8" r="0.4" fill="url(#rivet)"/>
    <circle cx="14.2" cy="18" r="0.4" fill="url(#rivet)"/>
    <circle cx="17.8" cy="18" r="0.4" fill="url(#rivet)"/>
    <circle cx="15.3" cy="17.3" r="0.5" fill="#FFFFFF" opacity="0.3"/>
  </g>
</g>
</svg>