<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="grille" cx="42%" cy="38%" r="65%">
    <stop offset="0%" stop-color="#2E2A22"/>
    <stop offset="100%" stop-color="#0E0C08"/>
  </radialGradient>
  <radialGradient id="hub" cx="35%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="100%" stop-color="#8A6420"/>
  </radialGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.3" stdDeviation="0.4" flood-color="#000000" flood-opacity="0.3"/>
  </filter>
  <clipPath id="plateClip"><rect x="3" y="3" width="26" height="26" rx="3.5"/></clipPath>
</defs>

<g filter="url(#dropshadow)">
  <!-- brass ceiling mounting plate -->
  <rect x="3" y="3" width="26" height="26" rx="3.5" fill="url(#brass)" stroke="#4A3410" stroke-width="0.6"/>
  <rect x="3.6" y="3.4" width="24.8" height="1" rx="0.4" fill="#FFFFFF" opacity="0.28"/>
  <ellipse cx="8" cy="24" rx="5" ry="4.2" fill="url(#patina)" clip-path="url(#plateClip)"/>

  <!-- corner rivets -->
  <circle cx="5.4" cy="5.4" r="0.85" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
  <circle cx="5.18" cy="5.18" r="0.2" fill="#F0D080"/>
  <circle cx="26.6" cy="5.4" r="0.85" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
  <circle cx="26.38" cy="5.18" r="0.2" fill="#F0D080"/>
  <circle cx="5.4" cy="26.6" r="0.85" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
  <circle cx="5.18" cy="26.38" r="0.2" fill="#F0D080"/>
  <circle cx="26.6" cy="26.6" r="0.85" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
  <circle cx="26.38" cy="26.38" r="0.2" fill="#F0D080"/>

  <!-- recessed circular grille housing -->
  <circle cx="16" cy="16" r="10.4" fill="url(#grille)" stroke="#4A3410" stroke-width="0.55"/>

  <!-- concentric ring diffuser slats -->
  <circle cx="16" cy="16" r="8.6" fill="none" stroke="url(#brassDark)" stroke-width="0.4"/>
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="url(#brassDark)" stroke-width="0.4"/>
  <circle cx="16" cy="16" r="4.5" fill="none" stroke="url(#brassDark)" stroke-width="0.4"/>

  <!-- radial spokes -->
  <line x1="16.00" y1="13.40" x2="16.00" y2="7.40" stroke="url(#brassDark)" stroke-width="0.35" opacity="0.85"/>
<line x1="17.84" y1="14.16" x2="22.08" y2="9.92" stroke="url(#brassDark)" stroke-width="0.35" opacity="0.85"/>
<line x1="18.60" y1="16.00" x2="24.60" y2="16.00" stroke="url(#brassDark)" stroke-width="0.35" opacity="0.85"/>
<line x1="17.84" y1="17.84" x2="22.08" y2="22.08" stroke="url(#brassDark)" stroke-width="0.35" opacity="0.85"/>
<line x1="16.00" y1="18.60" x2="16.00" y2="24.60" stroke="url(#brassDark)" stroke-width="0.35" opacity="0.85"/>
<line x1="14.16" y1="17.84" x2="9.92" y2="22.08" stroke="url(#brassDark)" stroke-width="0.35" opacity="0.85"/>
<line x1="13.40" y1="16.00" x2="7.40" y2="16.00" stroke="url(#brassDark)" stroke-width="0.35" opacity="0.85"/>
<line x1="14.16" y1="14.16" x2="9.92" y2="9.92" stroke="url(#brassDark)" stroke-width="0.35" opacity="0.85"/>

  <!-- center hub cap -->
  <circle cx="16" cy="16" r="1.7" fill="url(#hub)" stroke="#4A3410" stroke-width="0.3"/>
  <circle cx="15.65" cy="15.65" r="0.4" fill="#FFFFFF" opacity="0.5"/>
</g>
</svg>