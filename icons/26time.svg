<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="face" cx="50%" cy="42%" r="65%">
    <stop offset="0%" stop-color="#E9E9EA"/>
    <stop offset="100%" stop-color="#C6C8CA"/>
  </radialGradient>
  <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.55"/>
    <stop offset="35%" stop-color="#FFFFFF" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="hub" cx="35%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#FF9E95"/>
    <stop offset="55%" stop-color="#D32F2F"/>
    <stop offset="100%" stop-color="#7A1810"/>
  </radialGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
  <clipPath id="faceClip">
    <circle cx="16" cy="16" r="11"/>
  </clipPath>
</defs>

<ellipse cx="16" cy="29.4" rx="10.6" ry="1.6" fill="#000000" opacity="0.28" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">
  <!-- brass bezel -->
  <circle cx="16" cy="16" r="13.2" fill="url(#brass)" stroke="#4A3410" stroke-width="0.7"/>
  <ellipse cx="12.4" cy="20.5" rx="6.2" ry="4.6" fill="url(#patina)" clip-path="url(#faceClip)"/>
  <circle cx="24.91" cy="7.09" r="0.95" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.25"/><circle cx="24.10" cy="7.01" r="0.24" fill="#F0D080"/>
<circle cx="24.91" cy="24.91" r="0.95" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.25"/><circle cx="24.99" cy="24.10" r="0.24" fill="#F0D080"/>
<circle cx="7.09" cy="24.91" r="0.95" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.25"/><circle cx="7.90" cy="24.99" r="0.24" fill="#F0D080"/>
<circle cx="7.09" cy="7.09" r="0.95" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.25"/><circle cx="7.01" cy="7.90" r="0.24" fill="#F0D080"/>

  <!-- face -->
  <circle cx="16" cy="16" r="11" fill="url(#face)" stroke="#8A6420" stroke-width="0.5"/>

  <line x1="16.00" y1="5.00" x2="16.00" y2="7.00" stroke="#6B4A18" stroke-width="0.95" stroke-linecap="round"/>
<line x1="21.50" y1="6.47" x2="20.95" y2="7.43" stroke="#3B2A0E" stroke-width="0.5" stroke-linecap="round"/>
<line x1="25.53" y1="10.50" x2="24.57" y2="11.05" stroke="#3B2A0E" stroke-width="0.5" stroke-linecap="round"/>
<line x1="27.00" y1="16.00" x2="25.00" y2="16.00" stroke="#6B4A18" stroke-width="0.95" stroke-linecap="round"/>
<line x1="25.53" y1="21.50" x2="24.57" y2="20.95" stroke="#3B2A0E" stroke-width="0.5" stroke-linecap="round"/>
<line x1="21.50" y1="25.53" x2="20.95" y2="24.57" stroke="#3B2A0E" stroke-width="0.5" stroke-linecap="round"/>
<line x1="16.00" y1="27.00" x2="16.00" y2="25.00" stroke="#6B4A18" stroke-width="0.95" stroke-linecap="round"/>
<line x1="10.50" y1="25.53" x2="11.05" y2="24.57" stroke="#3B2A0E" stroke-width="0.5" stroke-linecap="round"/>
<line x1="6.47" y1="21.50" x2="7.43" y2="20.95" stroke="#3B2A0E" stroke-width="0.5" stroke-linecap="round"/>
<line x1="5.00" y1="16.00" x2="7.00" y2="16.00" stroke="#6B4A18" stroke-width="0.95" stroke-linecap="round"/>
<line x1="6.47" y1="10.50" x2="7.43" y2="11.05" stroke="#3B2A0E" stroke-width="0.5" stroke-linecap="round"/>
<line x1="10.50" y1="6.47" x2="11.05" y2="7.43" stroke="#3B2A0E" stroke-width="0.5" stroke-linecap="round"/>

  <!-- hands -->
  <polygon points="11.15,13.20 16.43,15.26 15.57,16.74" fill="#6B4A18" stroke="#4A3410" stroke-width="0.25"/>
  <polygon points="23.45,11.70 16.32,16.56 15.68,15.44" fill="#8A6420" stroke="#4A3410" stroke-width="0.22"/>
  <polygon points="21.10,24.83 15.52,16.27 16.48,15.72" fill="#D32F2F" stroke="#7A1810" stroke-width="0.15"/>
  <polygon points="14.70,13.75 15.57,16.25 16.43,15.75"/>

  <!-- glass sheen -->
  <ellipse cx="13" cy="12" rx="7.5" ry="5.5" fill="url(#sheen)" clip-path="url(#faceClip)"/>

  <!-- jeweled center hub -->
  <circle cx="16" cy="16" r="1.7" fill="url(#brass)" stroke="#4A3410" stroke-width="0.3"/>
  <circle cx="16" cy="16" r="0.85" fill="url(#hub)"/>
  <circle cx="15.7" cy="15.65" r="0.22" fill="#FFFFFF" opacity="0.75"/>
</g>
</svg>