<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <radialGradient id="snowHead" cx="38%" cy="30%" r="75%">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="70%" stop-color="#EDF3F6"/>
    <stop offset="100%" stop-color="#C9D6DC"/>
  </radialGradient>
  <radialGradient id="snowMid" cx="38%" cy="28%" r="75%">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="65%" stop-color="#EAF1F4"/>
    <stop offset="100%" stop-color="#C2D0D7"/>
  </radialGradient>
  <radialGradient id="snowBase" cx="36%" cy="26%" r="78%">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="60%" stop-color="#E6EEF1"/>
    <stop offset="100%" stop-color="#B7C7CF"/>
  </radialGradient>
  <linearGradient id="carrot" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#FFA552"/>
    <stop offset="100%" stop-color="#D9691E"/>
  </linearGradient>
  <linearGradient id="lens" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#DDE7EF"/>
    <stop offset="100%" stop-color="#8B9BA8"/>
  </linearGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
</defs>

<ellipse cx="16" cy="30.6" rx="10.5" ry="1.3" fill="#000000" opacity="0.28" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">

  <!-- arms -->
  <g stroke="#5C3F22" stroke-width="0.75" stroke-linecap="round" fill="none">
    <path d="M11,14.5 L4.8,9.5"/>
    <path d="M6.2,10.6 L4.4,9.2"/>
    <path d="M5.6,11.6 L4,11.2"/>
    <path d="M21,14.5 L27.4,17.6"/>
    <path d="M26,16 L27.8,15.4"/>
    <path d="M26.4,18.1 L28.2,18.6"/>
  </g>

  <!-- base sphere -->
  <circle cx="16" cy="24" r="7" fill="url(#snowBase)" stroke="#A9BBC3" stroke-width="0.4"/>
  <!-- mid sphere -->
  <circle cx="16" cy="15.2" r="5" fill="url(#snowMid)" stroke="#A9BBC3" stroke-width="0.4"/>
  <!-- head -->
  <circle cx="16" cy="8" r="3.6" fill="url(#snowHead)" stroke="#A9BBC3" stroke-width="0.35"/>

  <!-- wind-up key in the belly -->
  <circle cx="21.6" cy="22.6" r="1.3" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.3"/>
  <rect x="22.6" y="21.9" width="3.4" height="1.4" rx="0.4" fill="url(#brass)" stroke="#4A3410" stroke-width="0.3"/>
  <rect x="25.2" y="20.7" width="1" height="3.8" rx="0.3" fill="url(#brass)" stroke="#4A3410" stroke-width="0.25"/>

  <!-- coal buttons -->
  <circle cx="16" cy="12.8" r="0.55" fill="#232321"/>
  <circle cx="16" cy="15.2" r="0.55" fill="#232321"/>
  <circle cx="16" cy="17.6" r="0.55" fill="#232321"/>

  <!-- face -->
  <circle cx="14.5" cy="7.3" r="0.42" fill="#232321"/>
  <circle cx="17.4" cy="7.1" r="0.42" fill="#232321"/>
  <polygon points="16.3,7.7 16.3,8.7 20,8.15" fill="url(#carrot)" stroke="#A6440C" stroke-width="0.2"/>
  <g fill="#232321">
    <circle cx="14.5" cy="9.6" r="0.28"/>
    <circle cx="15.4" cy="10" r="0.28"/>
    <circle cx="16.4" cy="10.05" r="0.28"/>
    <circle cx="17.2" cy="9.7" r="0.28"/>
  </g>

  <!-- brass monocle on the right eye -->
  <circle cx="17.4" cy="7.1" r="1.15" fill="none" stroke="url(#brass)" stroke-width="0.45"/>
  <path d="M18.5,7.6 C19,8.6 18.8,9.8 18.1,10.5" fill="none" stroke="url(#brass)" stroke-width="0.35"/>

  <!-- tiny pipe + steam -->
  <path d="M18.6,10 L20.6,10.6 L20.9,9.9" fill="none" stroke="url(#brassDark)" stroke-width="0.7" stroke-linecap="round"/>
  <g fill="none" stroke="#DCE3E6" stroke-linecap="round" stroke-width="0.55" opacity="0.6">
    <path d="M21,9.4 C21.8,8.2 20.6,7.4 21.2,6.2 C21.7,5.2 20.8,4.2 21.3,3.2"/>
  </g>

  <!-- top hat -->
  <ellipse cx="16" cy="4.7" rx="4.3" ry="1.05" fill="#232321" stroke="#000000" stroke-width="0.3"/>
  <rect x="13.2" y="1.3" width="5.6" height="3.4" fill="#2A2A28" stroke="#000000" stroke-width="0.3"/>
  <ellipse cx="16" cy="1.3" rx="2.8" ry="0.75" fill="#2A2A28" stroke="#000000" stroke-width="0.25"/>
  <rect x="13.2" y="3.4" width="5.6" height="1.15" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.25"/>
  <circle cx="14.1" cy="3.98" r="0.32" fill="url(#brass)"/>
  <circle cx="16" cy="3.98" r="0.32" fill="url(#brass)"/>
  <circle cx="17.9" cy="3.98" r="0.32" fill="url(#brass)"/>

  <!-- goggles resting on the brim -->
  <path d="M18.6,4.55 C19.3,3.9 20.3,3.9 21,4.55" fill="none" stroke="url(#brassDark)" stroke-width="0.4"/>
  <circle cx="18.7" cy="4.75" r="1" fill="url(#lens)" stroke="#4A3410" stroke-width="0.3"/>
  <circle cx="20.9" cy="4.75" r="1" fill="url(#lens)" stroke="#4A3410" stroke-width="0.3"/>
  <circle cx="18.45" cy="4.5" r="0.25" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="20.65" cy="4.5" r="0.25" fill="#FFFFFF" opacity="0.7"/>
</g>
</svg>