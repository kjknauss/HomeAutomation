<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F7F2E2"/>
    <stop offset="100%" stop-color="#E7DFC6"/>
  </linearGradient>
  <linearGradient id="pageFold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#DCD2B0"/>
    <stop offset="100%" stop-color="#C7BB94"/>
  </linearGradient>
  <linearGradient id="redBand" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FF9E95"/>
    <stop offset="45%" stop-color="#D32F2F"/>
    <stop offset="100%" stop-color="#8C2A22"/>
  </linearGradient>
  <radialGradient id="jewelGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFEB8A" stop-opacity="0.75"/>
    <stop offset="100%" stop-color="#FFEB8A" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="jewel" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFEB8A"/>
    <stop offset="100%" stop-color="#F0A623"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="100%" stop-color="#8A6420"/>
  </linearGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
</defs>

<ellipse cx="16" cy="29.6" rx="10.5" ry="1.6" fill="#000000" opacity="0.28" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">

  <!-- hanger rings, poking above the frame -->
  <g>
    <circle cx="11.5" cy="4.4" r="2.0" fill="none" stroke="url(#ring)" stroke-width="1.1"/>
    <circle cx="20.5" cy="4.4" r="2.0" fill="none" stroke="url(#ring)" stroke-width="1.1"/>
  </g>

  <!-- outer brass frame -->
  <rect x="3" y="4.6" width="26" height="24.4" rx="2.3" fill="url(#brass)" stroke="#4A3410" stroke-width="0.6"/>
  <!-- top bevel highlight / bottom bevel shadow -->
  <rect x="3.6" y="5" width="24.8" height="0.9" rx="0.4" fill="#FFFFFF" opacity="0.3"/>
  <rect x="3.6" y="27.9" width="24.8" height="1" rx="0.4" fill="#000000" opacity="0.25"/>

  <!-- corner rivets -->
  <circle cx="5" cy="6.6" r="0.8" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
  <circle cx="4.78" cy="6.38" r="0.2" fill="#F0D080"/>
  <circle cx="27" cy="6.6" r="0.8" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
  <circle cx="26.78" cy="6.38" r="0.2" fill="#F0D080"/>
  <circle cx="5" cy="27" r="0.8" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
  <circle cx="4.78" cy="26.78" r="0.2" fill="#F0D080"/>
  <circle cx="27" cy="27" r="0.8" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
  <circle cx="26.78" cy="26.78" r="0.2" fill="#F0D080"/>

  <!-- inset page -->
  <rect x="5.2" y="7" width="21.6" height="20" rx="1" fill="url(#page)"/>

  <!-- red month band -->
  <path d="M5.2,8 a1,1 0 0 1 1,-1 h19.6 a1,1 0 0 1 1,1 v4.6 h-21.6 z" fill="url(#redBand)"/>
  <rect x="5.2" y="7.2" width="21.6" height="0.9" fill="#FFFFFF" opacity="0.3"/>
  <rect x="5.2" y="12.3" width="21.6" height="0.55" fill="#8A6420" opacity="0.6"/>

  <!-- date grid -->
  <g stroke="#B9AE8E" stroke-width="0.35">
    <line x1="5.2" y1="16.4" x2="26.8" y2="16.4"/>
    <line x1="5.2" y1="20.1" x2="26.8" y2="20.1"/>
    <line x1="5.2" y1="23.8" x2="26.8" y2="23.8"/>
    <line x1="9.4" y1="12.9" x2="9.4" y2="27"/>
    <line x1="13.6" y1="12.9" x2="13.6" y2="27"/>
    <line x1="17.8" y1="12.9" x2="17.8" y2="27"/>
    <line x1="22" y1="12.9" x2="22" y2="27"/>
  </g>

  <!-- page fold corner -->
  <path d="M23.4,25.6 L26.8,25.6 L26.8,27 a1,1 0 0 1 -1,1 h-2.4 z" fill="url(#pageFold)"/>

  <!-- jeweled "today" marker -->
  <circle cx="15.7" cy="22" r="2.3" fill="url(#jewelGlow)"/>
  <rect x="13.9" y="20.2" width="3.6" height="3.6" rx="0.6" fill="url(#jewel)" stroke="#8A5A12" stroke-width="0.3"/>
  <circle cx="14.7" cy="21.1" r="0.4" fill="#FFFFFF" opacity="0.7"/>
</g>
</svg>