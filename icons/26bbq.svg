<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="bowlShade" cx="38%" cy="15%" r="85%">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#6B4A18"/>
  </radialGradient>
  <radialGradient id="ember" cx="50%" cy="55%" r="55%">
    <stop offset="0%" stop-color="#FFEB8A"/>
    <stop offset="35%" stop-color="#F0A623" stop-opacity="0.9"/>
    <stop offset="70%" stop-color="#D3491F" stop-opacity="0.6"/>
    <stop offset="100%" stop-color="#D3491F" stop-opacity="0"/>
  </radialGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
  <clipPath id="openingClip"><ellipse cx="16" cy="12.6" rx="7.6" ry="1.7"/></clipPath>
  <clipPath id="bodyClip"><path d="M7,13 C7,19 11,23.5 16,23.5 C21,23.5 25,19 25,13 Z"/></clipPath>
</defs>

<ellipse cx="16" cy="29.6" rx="10.5" ry="1.5" fill="#000000" opacity="0.28" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">

  <!-- legs -->
  <g stroke="url(#brassDark)" stroke-width="1.5" stroke-linecap="round" fill="none">
    <path d="M12,22 L8,29"/>
    <path d="M20,22 L24,29"/>
    <path d="M16,22.5 L16,29"/>
  </g>
  <!-- crossbar shelf -->
  <rect x="9.3" y="25.6" width="13.4" height="1" rx="0.5" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.3"/>

  <!-- bowl body (rounded dome, bottom half) -->
  <path d="M7,13 C7,19 11,23.5 16,23.5 C21,23.5 25,19 25,13 Z" fill="url(#bowlShade)" stroke="#4A3410" stroke-width="0.6"/>
  <ellipse cx="12" cy="19" rx="4" ry="3.4" fill="url(#patina)" clip-path="url(#bodyClip)"/>
  <path d="M9,14.5 C9.3,18.5 12.2,21.5 15.6,21.9" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="0.8"/>

  <!-- side vent handles -->
  <rect x="4.4" y="14.3" width="2.6" height="1.6" rx="0.7" fill="url(#brass)" stroke="#4A3410" stroke-width="0.35"/>
  <rect x="25" y="14.3" width="2.6" height="1.6" rx="0.7" fill="url(#brass)" stroke="#4A3410" stroke-width="0.35"/>

  <!-- rim ring -->
  <ellipse cx="16" cy="12.6" rx="9" ry="2.3" fill="url(#brass)" stroke="#4A3410" stroke-width="0.6"/>
  <ellipse cx="16" cy="12.6" rx="7.6" ry="1.7" fill="#2A1D08"/>

  <!-- grate + embers, clipped to the opening -->
  <g clip-path="url(#openingClip)">
    <ellipse cx="16" cy="13.1" rx="6.4" ry="1.5" fill="url(#ember)"/>
    <g stroke="#6B4A18" stroke-width="0.35" opacity="0.9">
      <line x1="9" y1="12.6" x2="23" y2="12.6"/>
      <line x1="9.3" y1="11.8" x2="22.7" y2="11.8"/>
      <line x1="9.3" y1="13.4" x2="22.7" y2="13.4"/>
    </g>
  </g>
  <ellipse cx="16" cy="12.6" rx="9" ry="2.3" fill="none" stroke="#4A3410" stroke-width="0.5"/>

  <!-- rivets around the rim -->
  <circle cx="9.3" cy="12.1" r="0.5" fill="url(#rivet)"/>
  <circle cx="22.7" cy="12.1" r="0.5" fill="url(#rivet)"/>
  <circle cx="16" cy="10.35" r="0.5" fill="url(#rivet)"/>

  <!-- smoke wisps -->
  <g fill="none" stroke="#DCE3E6" stroke-linecap="round" stroke-width="0.7" opacity="0.55">
    <path d="M12,10 C11,8.4 12.6,7.4 11.7,6 C11,4.9 12,3.9 11.6,2.8"/>
    <path d="M16.4,9.4 C15.4,7.8 17,6.8 16.1,5.4 C15.4,4.3 16.4,3.3 16,2.2"/>
    <path d="M20.4,10 C19.4,8.4 21,7.4 20.1,6 C19.4,4.9 20.4,3.9 20,2.8"/>
  </g>
</g>
</svg>