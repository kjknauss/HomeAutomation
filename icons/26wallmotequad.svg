<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#E4E8EC"/>
  </linearGradient>
  <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.32"/>
    <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>
  <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#F4F8FF" stop-opacity="0.9"/>
    <stop offset="100%" stop-color="#F4F8FF" stop-opacity="0"/>
  </radialGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <clipPath id="plateClip"><rect x="5" y="5" width="22" height="22" rx="2.6"/></clipPath>
  <clipPath id="glassClip"><rect x="7.4" y="7.4" width="17.2" height="17.2" rx="1"/></clipPath>
</defs>

<g filter="url(#dropshadow)">
  <!-- brass mounting plate -->
  <rect x="5" y="5" width="22" height="22" rx="2.6" fill="url(#brass)" stroke="#4A3410" stroke-width="0.6"/>
  <rect x="5.6" y="5.4" width="20.8" height="1" rx="0.4" fill="#FFFFFF" opacity="0.28"/>
  <ellipse cx="9" cy="23" rx="4.5" ry="4" fill="url(#patina)" clip-path="url(#plateClip)"/>

  <!-- corner rivets -->
  <circle cx="6.6" cy="6.6" r="0.75" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="6.4" cy="6.4" r="0.18" fill="#F0D080"/>
  <circle cx="25.4" cy="6.6" r="0.75" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="25.2" cy="6.4" r="0.18" fill="#F0D080"/>
  <circle cx="6.6" cy="25.4" r="0.75" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="6.4" cy="25.2" r="0.18" fill="#F0D080"/>
  <circle cx="25.4" cy="25.4" r="0.75" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="25.2" cy="25.2" r="0.18" fill="#F0D080"/>

  <!-- recessed glass touch surface, divided into 4 equal zones -->
  <rect x="7.4" y="7.4" width="17.2" height="17.2" rx="1" fill="url(#glass)" stroke="#9AA5AC" stroke-width="0.35"/>
  <g clip-path="url(#glassClip)">
    <polygon points="7.4,7.4 15,7.4 7.4,15" fill="url(#sheen)"/>
  </g>
  <line x1="16" y1="7.8" x2="16" y2="24.2" stroke="#7FC4E8" stroke-width="0.55"/>
  <line x1="7.8" y1="16" x2="24.2" y2="16" stroke="#7FC4E8" stroke-width="0.55"/>

  <!-- RGB status LED at the center, where the four zones meet -->
  <circle cx="16" cy="16" r="2.4" fill="url(#ledGlow)"/>
  <path d="M16,14.6 A1.4,1.4 0 0 1 17.2,16.7 L16,16 Z" fill="#E5695E"/>
  <path d="M17.2,16.7 A1.4,1.4 0 0 1 14.8,16.7 L16,16 Z" fill="#5FCB6E"/>
  <path d="M14.8,16.7 A1.4,1.4 0 0 1 16,14.6 L16,16 Z" fill="#3E86D6"/>
  <circle cx="16" cy="16" r="0.55" fill="#F4F8FF"/>
</g>
</svg>