<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#4A4A48"/>
    <stop offset="100%" stop-color="#232321"/>
  </linearGradient>
  <linearGradient id="fold" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#E9E9E7"/>
    <stop offset="100%" stop-color="#B9B9B6"/>
  </linearGradient>
  <radialGradient id="lens" cx="35%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="100%" stop-color="#8A6420"/>
  </radialGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
  <clipPath id="bodyClip"><rect x="9" y="3" width="14" height="26" rx="1.8"/></clipPath>
  <clipPath id="screenClip"><rect x="10.4" y="4.6" width="11.2" height="20.4" rx="0.6"/></clipPath>
</defs>

<ellipse cx="16" cy="29.5" rx="9" ry="1.5" fill="#000000" opacity="0.28" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">
  <!-- brass body / bezel -->
  <rect x="9" y="3" width="14" height="26" rx="1.8" fill="url(#brass)" stroke="#4A3410" stroke-width="0.6"/>
  <rect x="9.6" y="3.4" width="12.8" height="1" rx="0.4" fill="#FFFFFF" opacity="0.3"/>
  <ellipse cx="12" cy="24" rx="3.4" ry="4" fill="url(#patina)" clip-path="url(#bodyClip)"/>

  <!-- corner rivets -->
  <circle cx="10.5" cy="4.7" r="0.55" fill="url(#rivet)"/>
  <circle cx="10.35" cy="4.55" r="0.14" fill="#F0D080"/>
  <circle cx="21.5" cy="4.7" r="0.55" fill="url(#rivet)"/>
  <circle cx="21.35" cy="4.55" r="0.14" fill="#F0D080"/>
  <circle cx="10.5" cy="27.3" r="0.55" fill="url(#rivet)"/>
  <circle cx="10.35" cy="27.15" r="0.14" fill="#F0D080"/>
  <circle cx="21.5" cy="27.3" r="0.55" fill="url(#rivet)"/>
  <circle cx="21.35" cy="27.15" r="0.14" fill="#F0D080"/>

  <!-- screen -->
  <rect x="10.4" y="4.6" width="11.2" height="20.4" rx="0.6" fill="url(#screen)" stroke="#1A1A18" stroke-width="0.35"/>
  <g clip-path="url(#screenClip)">
    <polygon points="21.6,4.6 21.6,10 16.2,4.6" fill="url(#fold)" opacity="0.9"/>
    <polygon points="21.6,4.6 21.6,7.6 18.6,4.6" fill="#FFFFFF" opacity="0.5"/>
  </g>

  <!-- home button -->
  <circle cx="16" cy="27" r="1" fill="url(#lens)" stroke="#4A3410" stroke-width="0.25"/>
  <circle cx="15.75" cy="26.75" r="0.25" fill="#FFF3D0" opacity="0.8"/>
</g>
</svg>