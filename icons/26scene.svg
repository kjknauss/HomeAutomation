<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="curtain" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FF9E95"/>
    <stop offset="45%" stop-color="#D32F2F"/>
    <stop offset="100%" stop-color="#7A241D"/>
  </linearGradient>
  <linearGradient id="curtainShade" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C23A32"/>
    <stop offset="100%" stop-color="#5E1D17"/>
  </linearGradient>
  <linearGradient id="backdrop" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#3B2A12"/>
    <stop offset="100%" stop-color="#140D04"/>
  </linearGradient>
  <linearGradient id="beam" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFEFC2" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#FFEFC2" stop-opacity="0.05"/>
  </linearGradient>
  <radialGradient id="floorglow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FFE9A8" stop-opacity="0.85"/>
    <stop offset="100%" stop-color="#FFE9A8" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="lens" cx="35%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#FFEB8A"/>
    <stop offset="100%" stop-color="#F0A623"/>
  </radialGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
  <path id="archOuter" d="M4,29 L4,12 A12,8 0 0 1 28,12 L28,29 Z"/>
  <path id="archInner" d="M6.7,29 L6.7,13.3 A9.3,6.1 0 0 1 25.3,13.3 L25.3,29 Z"/>
  <clipPath id="stageClip"><use href="#archInner"/></clipPath>
</defs>

<ellipse cx="16" cy="29.6" rx="11" ry="1.5" fill="#000000" opacity="0.28" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">
  <!-- brass proscenium frame (outer minus inner, even-odd) -->
  <path d="M4,29 L4,12 A12,8 0 0 1 28,12 L28,29 Z
            M6.7,29 L6.7,13.3 A9.3,6.1 0 0 1 25.3,13.3 L25.3,29 Z"
        fill="url(#brass)" fill-rule="evenodd" stroke="#4A3410" stroke-width="0.6"/>
  <ellipse cx="9" cy="24" rx="4.5" ry="4" fill="url(#patina)" clip-path="url(#stageClip)"/>

  <!-- top bevel highlight along the arch -->
  <path d="M6,12.6 A10.4,7.2 0 0 1 26,12.6" fill="none" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="0.8"/>

  <!-- rivets -->
  <g>
    <circle cx="4.9" cy="27.6" r="0.85" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
    <circle cx="4.68" cy="27.38" r="0.2" fill="#F0D080"/>
    <circle cx="27.1" cy="27.6" r="0.85" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
    <circle cx="26.88" cy="27.38" r="0.2" fill="#F0D080"/>
    <circle cx="4.9" cy="12.7" r="0.8" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
    <circle cx="4.68" cy="12.48" r="0.2" fill="#F0D080"/>
    <circle cx="27.1" cy="12.7" r="0.8" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
    <circle cx="26.88" cy="12.48" r="0.2" fill="#F0D080"/>
    <circle cx="16" cy="4.2" r="0.8" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.22"/>
    <circle cx="15.78" cy="3.98" r="0.2" fill="#F0D080"/>
  </g>

  <!-- stage interior -->
  <g clip-path="url(#stageClip)">
    <rect x="4" y="9" width="24" height="21" fill="url(#backdrop)"/>

    <!-- floor glow + floor line -->
    <ellipse cx="16" cy="27.5" rx="8" ry="2.6" fill="url(#floorglow)"/>
    <rect x="6.7" y="27.9" width="18.6" height="0.5" fill="#8A6420" opacity="0.7"/>

    <!-- spotlight beam -->
    <polygon points="16,8.3 10.8,27.5 21.2,27.5" fill="url(#beam)"/>

    <!-- left curtain -->
    <polygon points="6.8,9 9.6,9 11,17 9.8,20.6 11.6,24.2 10,29.3 6.8,29.3"
              fill="url(#curtain)" stroke="#5E1D17" stroke-width="0.25"/>
    <polygon points="9.6,9 8,9 8,29.3 10,29.3 11.6,24.2 9.8,20.6 11,17"
              fill="url(#curtainShade)" opacity="0.55"/>
    <!-- right curtain (mirrored) -->
    <polygon points="25.2,9 22.4,9 21,17 22.2,20.6 20.4,24.2 22,29.3 25.2,29.3"
              fill="url(#curtain)" stroke="#5E1D17" stroke-width="0.25"/>
    <polygon points="22.4,9 24,9 24,29.3 22,29.3 20.4,24.2 22.2,20.6 21,17"
              fill="url(#curtainShade)" opacity="0.55"/>

    <!-- tieback tassels -->
    <ellipse cx="9.8" cy="20.6" rx="1.1" ry="0.7" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.2"/>
    <line x1="9.4" y1="21.2" x2="9.1" y2="23" stroke="#8A6420" stroke-width="0.35"/>
    <line x1="10.2" y1="21.2" x2="10.5" y2="23" stroke="#8A6420" stroke-width="0.35"/>
    <ellipse cx="22.2" cy="20.6" rx="1.1" ry="0.7" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.2"/>
    <line x1="21.8" y1="21.2" x2="21.5" y2="23" stroke="#8A6420" stroke-width="0.35"/>
    <line x1="22.6" y1="21.2" x2="22.9" y2="23" stroke="#8A6420" stroke-width="0.35"/>

    <!-- footlights -->
    <g fill="url(#lens)">
      <circle cx="10" cy="28.3" r="0.55"/>
      <circle cx="13" cy="28.3" r="0.55"/>
      <circle cx="16" cy="28.3" r="0.55"/>
      <circle cx="19" cy="28.3" r="0.55"/>
      <circle cx="22" cy="28.3" r="0.55"/>
    </g>
  </g>

  <!-- spotlight fixture, mounted just above the stage clip so it isn't cropped -->
  <rect x="13.8" y="5.6" width="4.4" height="2.1" rx="0.6" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.3"/>
  <circle cx="16" cy="8.2" r="1.05" fill="url(#lens)" stroke="#8A5A12" stroke-width="0.25"/>
  <circle cx="15.7" cy="7.85" r="0.28" fill="#FFFFFF" opacity="0.7"/>
</g>
</svg>