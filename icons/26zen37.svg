<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.26"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="recess" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#8A6420"/>
  </linearGradient>
  <radialGradient id="ledGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#BFE6FF" stop-opacity="0.8"/>
    <stop offset="100%" stop-color="#BFE6FF" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="led" cx="35%" cy="30%" r="70%">
    <stop offset="0%" stop-color="#E8F6FF"/>
    <stop offset="100%" stop-color="#4C8FBF"/>
  </radialGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="paddleShadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.3" stdDeviation="0.35" flood-color="#000000" flood-opacity="0.5"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
  <clipPath id="plateClip"><rect x="7" y="2" width="18" height="28" rx="2.6"/></clipPath>
</defs>

<ellipse cx="16" cy="30" rx="9.5" ry="1.3" fill="#000000" opacity="0.25" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">
  <!-- brass wall plate -->
  <rect x="7" y="2" width="18" height="28" rx="2.6" fill="url(#brass)" stroke="#4A3410" stroke-width="0.6"/>
  <rect x="7.6" y="2.4" width="16.8" height="1" rx="0.4" fill="#FFFFFF" opacity="0.28"/>
  <ellipse cx="10.5" cy="23" rx="4.5" ry="4" fill="url(#patina)" clip-path="url(#plateClip)"/>

  <!-- mounting screws -->
  <circle cx="16" cy="4.6" r="0.85" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="15.75" cy="4.35" r="0.2" fill="#F0D080"/>
  <circle cx="16" cy="27.4" r="0.85" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="15.75" cy="27.15" r="0.2" fill="#F0D080"/>

  <!-- recessed bezel housing the buttons -->
  <rect x="9" y="6.2" width="14" height="21" rx="1.6" fill="url(#recess)" stroke="#4A3410" stroke-width="0.4"/>

  <!-- button 1: top large paddle -->
  <g filter="url(#paddleShadow)">
    <rect x="10" y="7.2" width="12" height="7.4" rx="1.3" fill="url(#brass)" stroke="#4A3410" stroke-width="0.4"/>
    <rect x="10.6" y="7.7" width="10.8" height="0.9" rx="0.4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="10.6" y="13.9" width="10.8" height="0.6" rx="0.3" fill="#000000" opacity="0.2"/>
  </g>
  <!-- LED indicator, top-left corner of button 1 -->
  <circle cx="11.6" cy="8.6" r="1.6" fill="url(#ledGlow)"/>
  <circle cx="11.6" cy="8.6" r="0.62" fill="url(#led)" stroke="#2E5E7F" stroke-width="0.18"/>

  <!-- button 2: second large paddle -->
  <g filter="url(#paddleShadow)">
    <rect x="10" y="15.2" width="12" height="7.4" rx="1.3" fill="url(#brass)" stroke="#4A3410" stroke-width="0.4"/>
    <rect x="10.6" y="15.7" width="10.8" height="0.9" rx="0.4" fill="#FFFFFF" opacity="0.3"/>
    <rect x="10.6" y="21.9" width="10.8" height="0.6" rx="0.3" fill="#000000" opacity="0.2"/>
  </g>

  <!-- buttons 3 & 4: small left/right buttons at the bottom -->
  <g filter="url(#paddleShadow)">
    <rect x="10.2" y="23.6" width="5.4" height="3.0" rx="0.8" fill="url(#brass)" stroke="#4A3410" stroke-width="0.32"/>
    <rect x="16.4" y="23.6" width="5.4" height="3.0" rx="0.8" fill="url(#brass)" stroke="#4A3410" stroke-width="0.32"/>
  </g>
  <rect x="10.6" y="23.9" width="4.6" height="0.5" rx="0.22" fill="#FFFFFF" opacity="0.28"/>
  <rect x="16.8" y="23.9" width="4.6" height="0.5" rx="0.22" fill="#FFFFFF" opacity="0.28"/>
</g>
</svg>