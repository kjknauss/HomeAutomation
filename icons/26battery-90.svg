<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="metal-b90" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AEB3B8"/>
      <stop offset="100%" stop-color="#54585C"/>
    </linearGradient>
    <linearGradient id="cavity-b90" x1="0" y1="0" x2="0" y2="1">
