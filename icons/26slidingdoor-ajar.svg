<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.30"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#CFEFDD"/>
    <stop offset="55%" stop-color="#8FC9AE"/>
    <stop offset="100%" stop-color="#4E8F72"/>
  </linearGradient>
  <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
    <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.05"/>
    <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
  </linearGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
</defs>

<ellipse cx="16" cy="29.6" rx="10.6" ry="1.5" fill="#000000" opacity="0.28" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">
  <!-- outer brass frame -->
  <rect x="3" y="4" width="26" height="25" rx="1.6" fill="url(#brass)" stroke="#4A3410" stroke-width="0.6"/>
  <rect x="3.6" y="4.5" width="24.8" height="0.9" fill="#FFFFFF" opacity="0.3"/>
  <ellipse cx="9" cy="23" rx="5" ry="4" fill="url(#patina)"/>

  <!-- corner rivets -->
  <circle cx="4.6" cy="5.7" r="0.75" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="4.4" cy="5.5" r="0.18" fill="#F0D080"/>
  <circle cx="27.4" cy="5.7" r="0.75" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="27.2" cy="5.5" r="0.18" fill="#F0D080"/>
  <circle cx="4.6" cy="27.3" r="0.75" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="4.4" cy="27.1" r="0.18" fill="#F0D080"/>
  <circle cx="27.4" cy="27.3" r="0.75" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="27.2" cy="27.1" r="0.18" fill="#F0D080"/>

  <!-- inner opening -->
  <rect x="15.30" y="6.00" width="11.70" height="21.40" fill="#140D04"/>
  
    <clipPath id="clip_5_6_10"><rect x="5.00" y="6.00" width="10.30" height="21.40"/></clipPath>
    <g clip-path="url(#clip_5_6_10)">
      <rect x="5.00" y="6.00" width="10.30" height="21.40" fill="url(#glass)"/>
      <line x1="10.15" y1="6.00" x2="10.15" y2="27.40" stroke="#3B5240" stroke-width="0.4"/>
<line x1="5.00" y1="16.70" x2="15.30" y2="16.70" stroke="#3B5240" stroke-width="0.4"/>
      <polygon points="5.00,6.00 10.67,6.00 5.00,20.98" fill="url(#sheen)"/>
    </g>
    <rect x="5.00" y="6.00" width="10.30" height="21.40" fill="none" stroke="#4A3410" stroke-width="0.35"/>
    
  
    <clipPath id="clip_15_6_9"><rect x="15.30" y="6.00" width="9.36" height="21.40"/></clipPath>
    <g clip-path="url(#clip_15_6_9)">
      <rect x="15.30" y="6.00" width="9.36" height="21.40" fill="url(#glass)"/>
      <line x1="19.98" y1="6.00" x2="19.98" y2="27.40" stroke="#3B5240" stroke-width="0.4"/>
<line x1="15.30" y1="16.70" x2="24.66" y2="16.70" stroke="#3B5240" stroke-width="0.4"/>
      <polygon points="15.30,6.00 20.45,6.00 15.30,20.98" fill="url(#sheen)"/>
    </g>
    <rect x="15.30" y="6.00" width="9.36" height="21.40" fill="none" stroke="#4A3410" stroke-width="0.35"/>
    

  <!-- brass mullion / track divider -->
  <rect x="14.75" y="5.7" width="1.1" height="22.0" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.25"/>

  <!-- bottom track rail + rollers -->
  <rect x="5" y="27.549999999999997" width="22" height="0.7" rx="0.3" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.2"/>
  <circle cx="16.7" cy="27.9" r="0.55" fill="url(#rivet)"/>
  <circle cx="23.26" cy="27.9" r="0.55" fill="url(#rivet)"/>

  <!-- recessed pull handle on the moving panel -->
  <rect x="23.06" y="16.20" width="1.6" height="1" rx="0.3" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.25"/>
</g>
</svg>