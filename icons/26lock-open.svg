<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="brass" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F0D080"/>
    <stop offset="55%" stop-color="#C9932F"/>
    <stop offset="100%" stop-color="#7A5518"/>
  </linearGradient>
  <linearGradient id="brassDark" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C9932F"/>
    <stop offset="60%" stop-color="#8A6420"/>
    <stop offset="100%" stop-color="#5C3F14"/>
  </linearGradient>
  <linearGradient id="rivet" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#6B4A18"/>
    <stop offset="100%" stop-color="#4A3410"/>
  </linearGradient>
  <radialGradient id="patina" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#3B5240" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#3B5240" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#EEF3F6"/>
    <stop offset="50%" stop-color="#AEBBC2"/>
    <stop offset="100%" stop-color="#5C6B78"/>
  </linearGradient>
  <filter id="dropshadow" x="-50%" y="-50%" width="200%" height="200%">
    <feDropShadow dx="0" dy="0.4" stdDeviation="0.5" flood-color="#000000" flood-opacity="0.35"/>
  </filter>
  <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1"/>
  </filter>
  <clipPath id="bodyClip"><rect x="8" y="15" width="16" height="13" rx="2.5"/></clipPath>
<radialGradient id="statusGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#E5695E" stop-opacity="0.6"/>
          <stop offset="100%" stop-color="#E5695E" stop-opacity="0"/>
        </radialGradient></defs>

<ellipse cx="16" cy="29.4" rx="9.5" ry="1.5" fill="#000000" opacity="0.28" filter="url(#blur1)"/>

<g filter="url(#dropshadow)">

  <!-- shackle (drawn behind the body so its ends appear to plug into the case) -->
  <path d="M11,17 L11,10.5 A5,5 0 0 1 21,10.5 L21,17" fill="none" stroke="url(#steel)" stroke-width="2.6" stroke-linecap="round" transform="rotate(78 21 17)"/>
  <path d="M11,17 L11,10.5 A5,5 0 0 1 21,10.5 L21,17" fill="none" stroke="#3E4A52" stroke-width="2.6" stroke-linecap="round" opacity="0.18" transform="rotate(78 21 17)"/>

  <!-- brass body -->
  <rect x="8" y="15" width="16" height="13" rx="2.5" fill="url(#brass)" stroke="#4A3410" stroke-width="0.6"/>
  <rect x="8.6" y="15.4" width="14.8" height="1" rx="0.4" fill="#FFFFFF" opacity="0.3"/>
  <ellipse cx="11.5" cy="24" rx="3.6" ry="3" fill="url(#patina)" clip-path="url(#bodyClip)"/>

  <!-- shackle socket holes -->
  <ellipse cx="11" cy="15.9" rx="1.3" ry="0.6" fill="#2A1D08"/>
  <ellipse cx="21" cy="15.9" rx="1.3" ry="0.6" fill="#2A1D08"/>

  <!-- corner rivets -->
  <circle cx="9.4" cy="16.6" r="0.6" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.18"/>
  <circle cx="9.24" cy="16.44" r="0.15" fill="#F0D080"/>
  <circle cx="22.6" cy="16.6" r="0.6" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.18"/>
  <circle cx="22.44" cy="16.44" r="0.15" fill="#F0D080"/>
  <circle cx="9.4" cy="26.6" r="0.6" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.18"/>
  <circle cx="9.24" cy="26.44" r="0.15" fill="#F0D080"/>
  <circle cx="22.6" cy="26.6" r="0.6" fill="url(#rivet)" stroke="#4A3410" stroke-width="0.18"/>
  <circle cx="22.44" cy="26.44" r="0.15" fill="#F0D080"/>

  <!-- keyhole -->
  <circle cx="13.2" cy="20.4" r="1.35" fill="#2A1D08"/>
  <polygon points="12.5,21.2 13.9,21.2 13.5,24 12.9,24" fill="#2A1D08"/>

  <!-- status lens -->
  <circle cx="21" cy="24.5" r="2.2" fill="url(#statusGlow)"/>
  <circle cx="21" cy="24.5" r="1.25" fill="url(#brassDark)" stroke="#4A3410" stroke-width="0.25"/>
  <circle cx="21" cy="24.5" r="0.85" fill="#FF9E95"/>
  <circle cx="21" cy="24.5" r="0.85" fill="none" stroke="#D32F2F" stroke-width="0.25"/>
  <circle cx="20.7" cy="24.2" r="0.22" fill="#FFFFFF" opacity="0.8"/>
</g>
</svg>